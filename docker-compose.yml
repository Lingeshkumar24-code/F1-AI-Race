version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f1_race_engineer_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - backend_data:/app/backend/data
      - backend_models:/app/backend/models
      - backend_chromadb:/app/backend/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: f1_race_engineer_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_models:
  backend_chromadb:
